<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Vidéo — Salaires & k-NN · Sujet 02</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0c0e14;
      --surface:  #13161f;
      --surface2: #1a1e2b;
      --border:   #252a3a;
      --blanc:    #eef1f8;
      --gris:     #7a8199;
      --bleu:     #4d9eff;
      --or:       #f0a030;
      --or2:      #ffd580;
      --vert:     #3dd68c;
      --rouge:    #ff5a5a;
      --violet:   #b48bfa;
      --cyan:     #3dd6d6;
      --rose:     #f472b6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--blanc);
      font-family: 'Lora', Georgia, serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .55rem 1.5rem;
      background: rgba(12,14,20,.97);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tb-logo {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      color: var(--rose);
      letter-spacing: .1em;
      white-space: nowrap;
    }
    .tb-progress {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .tb-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--violet));
      border-radius: 2px;
      transition: width .4s ease;
    }
    .tb-counter {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      color: var(--gris);
      white-space: nowrap;
    }
    .tb-timer {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--or2);
      min-width: 48px;
      text-align: right;
    }
    .tb-keys {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      color: var(--gris);
      display: flex;
      gap: .6rem;
    }
    .tb-keys kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: .1rem .4rem;
      border-radius: 3px;
      color: var(--blanc);
    }

    /* ── STAGE ── */
    .stage {
      flex: 1;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      position: relative;
    }

    /* Segment strip */
    .segment-strip {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: .5rem 0;
    }
    .seg-item {
      padding: .55rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      color: var(--gris);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all .15s;
      line-height: 1.4;
    }
    .seg-item:hover { background: var(--surface2); color: var(--blanc); }
    .seg-item.active {
      border-left-color: var(--rose);
      color: var(--rose);
      background: rgba(244,114,182,.07);
    }
    .seg-item .si-num {
      display: block;
      font-size: .58rem;
      color: var(--border);
      margin-bottom: .15rem;
    }
    .seg-item.active .si-num { color: var(--rose); opacity: .7; }

    /* ── MAIN SLIDE ── */
    .slide-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .slide {
      display: none;
      flex-direction: column;
      height: 100%;
      padding: 2rem 2.5rem 1.5rem;
      overflow-y: auto;
      animation: slideIn .22s ease;
    }
    .slide.active { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-type {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .slide-type::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .slide-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 2.5vw, 2.1rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.2rem;
      color: var(--blanc);
    }

    .speech {
      font-size: clamp(1rem, 1.6vw, 1.22rem);
      line-height: 1.85;
      color: #c8d0e4;
      max-width: 840px;
    }
    .speech p { margin-bottom: .9rem; }
    .speech p:last-child { margin-bottom: 0; }

    /* Action / Parole */
    .say { color: var(--blanc); font-style: italic; }
    .do {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-family: 'DM Mono', monospace;
      font-size: .78em;
      background: rgba(244,114,182,.1);
      border: 1px solid rgba(244,114,182,.3);
      color: var(--rose);
      padding: .15rem .6rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .do::before { content: '▶ '; font-size: .7em; }

    /* Code blocks */
    .code-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--bleu);
      border-radius: 6px;
      padding: 1rem 1.2rem;
      margin: .8rem 0;
      font-family: 'DM Mono', monospace;
      font-size: clamp(.73rem, 1.05vw, .88rem);
      line-height: 1.75;
      color: #b8c8e8;
      overflow-x: auto;
      white-space: pre;
    }
    .code-block .hl  { color: var(--or2); font-weight: 500; }
    .code-block .bug { color: var(--rouge); text-decoration: underline wavy var(--rouge); }
    .code-block .fix { color: var(--vert); }
    .code-block .cm  { color: var(--gris); font-style: italic; }
    .code-block .key { color: var(--violet); }

    /* Pause card */
    .pause-card {
      background: rgba(180,139,250,.07);
      border: 1px solid rgba(180,139,250,.3);
      border-radius: 8px;
      padding: 1rem 1.4rem;
      margin: .8rem 0;
      display: flex;
      align-items: flex-start;
      gap: .8rem;
    }
    .pause-card .pc-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .1rem; }
    .pause-card .pc-text {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      color: var(--violet);
      line-height: 1.6;
    }
    .pause-card .pc-text strong { color: #fff; }

    /* Piège card */
    .piege-card {
      background: rgba(255,90,90,.05);
      border: 1px solid rgba(255,90,90,.22);
      border-radius: 8px;
      padding: .9rem 1.2rem;
      margin: .6rem 0;
      font-size: .9rem;
      color: #f5b8b8;
      line-height: 1.6;
    }
    .piege-card strong { color: var(--rouge); }

    /* Result card */
    .result-card {
      background: rgba(61,214,140,.05);
      border: 1px solid rgba(61,214,140,.2);
      border-radius: 8px;
      padding: .9rem 1.2rem;
      margin: .6rem 0;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      color: #a8efd0;
      line-height: 1.7;
    }
    .result-card strong { color: var(--vert); }

    /* Ethic card */
    .ethic-card {
      background: rgba(244,114,182,.06);
      border: 1px solid rgba(244,114,182,.25);
      border-radius: 8px;
      padding: 1rem 1.3rem;
      margin: .8rem 0;
      font-size: .92rem;
      color: #f9d0e5;
      line-height: 1.65;
    }
    .ethic-card strong { color: var(--rose); }

    /* Inline code */
    code {
      font-family: 'DM Mono', monospace;
      font-size: .88em;
      background: rgba(255,255,255,.07);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--or2);
    }

    /* Step list */
    .steps { list-style: none; margin: .6rem 0; }
    .steps li {
      display: flex;
      gap: .8rem;
      align-items: flex-start;
      padding: .45rem 0;
      border-bottom: 1px solid var(--border);
      font-size: clamp(.88rem, 1.3vw, 1rem);
      color: #c8d0e4;
      line-height: 1.55;
    }
    .steps li:last-child { border-bottom: none; }
    .steps .sn {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      background: var(--rose);
      color: #000;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-weight: 600;
      margin-top: .15rem;
    }

    /* Two-col layout for table comparison */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: .8rem 0;
    }
    .col-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .9rem 1.1rem;
      font-size: .85rem;
      line-height: 1.6;
    }
    .col-card .cc-title {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .5rem;
    }

    /* ── BOTTOM NAV ── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .8rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      padding: .5rem 1.2rem;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--blanc);
      cursor: pointer;
      transition: all .15s;
    }
    .nav-btn:hover { background: var(--border); }
    .nav-btn.primary {
      background: var(--rose);
      border-color: var(--rose);
      color: #000;
      font-weight: 600;
    }
    .nav-btn.primary:hover { opacity: .85; }
    .nav-btn:disabled { opacity: .3; cursor: default; }

    .nav-center {
      flex: 1;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--gris);
    }
    .nav-center strong { color: var(--blanc); font-size: .88rem; }

    /* Badges */
    .seg-badge {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      padding: .12rem .55rem;
      border-radius: 12px;
      margin-left: .5rem;
      vertical-align: middle;
    }
    .sb-intro  { background: rgba(244,114,182,.15); color: var(--rose); }
    .sb-rappel { background: rgba(61,214,140,.12);  color: var(--vert); }
    .sb-cours  { background: rgba(240,160,48,.12);  color: var(--or); }
    .sb-pause  { background: rgba(180,139,250,.12); color: var(--violet); }
    .sb-code   { background: rgba(74,158,255,.12);  color: var(--bleu); }
    .sb-correc { background: rgba(61,214,140,.12);  color: var(--vert); }
    .sb-piege  { background: rgba(255,90,90,.12);   color: var(--rouge); }
    .sb-ethic  { background: rgba(244,114,182,.12); color: var(--rose); }
    .sb-outro  { background: rgba(240,160,48,.15);  color: var(--or2); }

    /* Scrollbar */
    .slide::-webkit-scrollbar,
    .segment-strip::-webkit-scrollbar { width: 4px; }
    .slide::-webkit-scrollbar-track,
    .segment-strip::-webkit-scrollbar-track { background: transparent; }
    .slide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Shortcut overlay */
    .shortcut-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .shortcut-overlay.visible { display: flex; }
    .sc-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem 2.5rem;
      max-width: 400px; width: 90%;
    }
    .sc-box h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      color: var(--rose);
      margin-bottom: 1.2rem;
    }
    .sc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem; color: var(--gris);
    }
    .sc-row:last-child { border-bottom: none; }
    .sc-row kbd {
      font-family: 'DM Mono', monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .15rem .6rem;
      border-radius: 4px;
      color: var(--blanc);
      font-size: .75rem;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="tb-logo">🎬 SUJET 02 · SALAIRES &amp; k-NN</span>
  <div class="tb-progress"><div class="tb-bar" id="tbBar"></div></div>
  <span class="tb-counter" id="tbCounter">1 / 26</span>
  <span class="tb-timer" id="tbTimer">0:00</span>
  <div class="tb-keys">
    <span><kbd>←</kbd><kbd>→</kbd> naviguer</span>
    <span><kbd>?</kbd> aide</span>
    <span><kbd>T</kbd> timer</span>
    <span><kbd>R</kbd> reset</span>
  </div>
</div>

<div class="stage">
  <div class="segment-strip" id="strip"></div>
  <div class="slide-wrap">
    <div id="slides"></div>
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="btnPrev">← Préc.</button>
  <div class="nav-center">
    <strong id="navTitle">—</strong><br>
    <span id="navSub"></span>
  </div>
  <button class="nav-btn primary" id="btnNext">Suiv. →</button>
</div>

<div class="shortcut-overlay" id="scOverlay">
  <div class="sc-box">
    <h3>⌨️ Raccourcis clavier</h3>
    <div class="sc-row"><span>Slide suivante</span><kbd>→</kbd> ou <kbd>Space</kbd></div>
    <div class="sc-row"><span>Slide précédente</span><kbd>←</kbd></div>
    <div class="sc-row"><span>Première slide</span><kbd>Home</kbd></div>
    <div class="sc-row"><span>Dernière slide</span><kbd>End</kbd></div>
    <div class="sc-row"><span>Démarrer / arrêter timer</span><kbd>T</kbd></div>
    <div class="sc-row"><span>Remettre timer à zéro</span><kbd>R</kbd></div>
    <div class="sc-row"><span>Fermer cette aide</span><kbd>?</kbd> ou <kbd>Esc</kbd></div>
  </div>
</div>

<script>
const SLIDES = [

  // ── INTRO ────────────────────────────────────────────────────────────
  {
    segment: "🎬 Intro",
    type: "intro", badge: "sb-intro",
    title: "Générique d'ouverture",
    speech: `
      <p><span class="do">OBS : Scène TITRE — caméra pleine</span></p>
      <p><span class="say">"Bonjour ! Aujourd'hui on s'attaque au Sujet 2 de l'épreuve pratique NSI,
      session 2026 — Écarts de salaires femmes/hommes et algorithme des k plus proches voisins.</span></p>
      <p><span class="say">Quatre questions au programme. À chaque pause, arrêtez la vidéo et essayez vous-même — 
      c'est indispensable pour progresser. La fiche de révision est dans la description."</span></p>
      <p><span class="do">OBS : basculer → Scène FICHE HTML, section Sommaire visible</span></p>
      <p style="font-size:.85em; color:var(--gris);">⏱️ Durée cible : ~45 sec</p>
    `
  },

  // ── RAPPELS : LISTES DE DICOS ────────────────────────────────────────
  {
    segment: "📚 Listes de dicos",
    type: "rappel", badge: "sb-rappel",
    title: "Rappels — Listes de dictionnaires",
    speech: `
      <p><span class="do">OBS : Scène FICHE HTML — section "Rappels"</span></p>
      <p><span class="say">"Avant de coder, un rappel essentiel sur la structure de données centrale de ce sujet :
      la liste de dictionnaires."</span></p>
      <p><span class="say">"Imaginez un tableau Excel avec des colonnes : prénom, maths, NSI.
      En Python, chaque ligne devient un dictionnaire, et toutes les lignes sont dans une liste."</span></p>
      <div class="code-block"><span class="cm">annuaire = [</span>
    <span class="hl">{'prenom': 'Alice', 'maths': 17, 'nsi': 18}</span>,
    {'prenom': 'Bob',   'maths': 12, 'nsi': 15},
    {'prenom': 'Carla', 'maths': 14, 'nsi': 16}
]

<span class="cm"># Accès : annuaire[ligne][colonne]</span>
annuaire[<span class="hl">0</span>][<span class="hl">'nsi'</span>]   <span class="cm">→ 18   (NSI d'Alice)</span></div>
      <p><span class="say">"Pour parcourir tous les éléments, une boucle <code>for</code> suffit.
      Et pour filtrer — par exemple garder uniquement les bons en NSI — on utilise une compréhension de liste."</span></p>
      <div class="code-block"><span class="key">for</span> eleve <span class="key">in</span> annuaire:
    print(eleve[<span class="hl">'prenom'</span>])

<span class="cm"># Filtrer avec une compréhension :</span>
bons = [e <span class="key">for</span> e <span class="key">in</span> annuaire <span class="key">if</span> e[<span class="hl">'nsi'</span>] > 15]</div>
    `
  },

  // ── RAPPELS : MOYENNE ET NONE ─────────────────────────────────────────
  {
    segment: "📚 Moyenne & None",
    type: "rappel", badge: "sb-rappel",
    title: "Rappels — Moyenne conditionnelle & None",
    speech: `
      <p><span class="do">OBS : Scène FICHE HTML — suite des rappels</span></p>
      <p><span class="say">"Calculer une moyenne sur un champ d'une liste, c'est le cœur de ce sujet.
      Deux façons de faire — je vous montre les deux :"</span></p>
      <div class="code-block"><span class="cm"># Approche 1 : boucle for</span>
total = 0
<span class="key">for</span> e <span class="key">in</span> annuaire:
    total = total + e[<span class="hl">'nsi'</span>]
moyenne = total / len(annuaire)

<span class="cm"># Approche 2 : plus compacte avec sum()</span>
moyenne = sum(e[<span class="hl">'nsi'</span>] <span class="key">for</span> e <span class="key">in</span> annuaire) / len(annuaire)</div>
      <p><span class="say">"Mais attention — si la liste est vide, <code>len(annuaire)</code> vaut zéro
      et on divise par zéro. C'est une <code>ZeroDivisionError</code>.
      Il faut toujours tester ça avant de diviser :"</span></p>
      <div class="code-block"><span class="key">if</span> len(liste) == 0:
    <span class="key">return</span> <span class="hl">None</span>           <span class="cm"># aucun résultat → None</span>
<span class="key">return</span> sum(liste) / len(liste)</div>
      <p><span class="say">"Ce réflexe — vérifier la liste vide et renvoyer None — revient dans les quatre questions. Mémorisez-le."</span></p>
    `
  },

  // ── CONTEXTE & DONNÉES ───────────────────────────────────────────────
  {
    segment: "📊 Contexte",
    type: "cours", badge: "sb-cours",
    title: "Contexte — Les données du sujet",
    speech: `
      <p><span class="do">OBS : Scène FICHE HTML — section "Contexte"</span></p>
      <p><span class="say">"Selon l'INSEE, en France en 2023, les femmes gagnent en moyenne 15 % de moins que les hommes.
      Dans ce sujet, on va vérifier ça sur un jeu de données simulé de 2 000 employés."</span></p>
      <p><span class="say">"Chaque employé est un dictionnaire avec quatre champs :"</span></p>
      <div class="code-block"><span class="hl">employes_test</span> = [
    {<span class="hl">'experience'</span>: 5, <span class="hl">'etudes'</span>: 3, <span class="hl">'sexe'</span>: 'F', <span class="hl">'salaire'</span>: 2400},
    {'experience': 3, 'etudes': 3, 'sexe': 'M', 'salaire': 2550},
    {'experience': 5, 'etudes': 5, 'sexe': 'F', 'salaire': 2500},
    {'experience': 3, 'etudes': 5, 'sexe': 'M', 'salaire': 2800},
    {'experience': 2, 'etudes': 5, 'sexe': 'F', 'salaire': 2300},
    {'experience': 2, 'etudes': 3, 'sexe': 'M', 'salaire': 2700}
]</div>
      <p><span class="say">"Sur ce petit jeu de test :
      moyenne femmes = (2400 + 2500 + 2300) / 3 = <strong>2400 €</strong>,
      moyenne hommes = (2550 + 2800 + 2700) / 3 ≈ <strong>2683 €</strong>.
      Écart déjà visible. On aura aussi <code>donnees_completes.py</code> avec 2 000 entrées."</span></p>
    `
  },

  // ── PAUSE Q1 ─────────────────────────────────────────────────────────
  {
    segment: "⏸ Pause Q1",
    type: "pause", badge: "sb-pause",
    title: "⏸ PAUSE — Question 1",
    speech: `
      <p><span class="do">OBS : Scène PAUSE — carte noire + texte</span></p>
      <div class="pause-card">
        <span class="pc-icon">⏸</span>
        <div class="pc-text">
          <strong>STOP — Question 1</strong><br><br>
          Écrire la fonction :<br>
          <code>salaire_moyen_condition(employes, champ, valeur)</code><br><br>
          → renvoie le salaire moyen des employés dont <code>emp[champ] == valeur</code><br>
          → renvoie <code>None</code> si aucun employé ne correspond.<br><br>
          Exemple : <code>salaire_moyen_condition(employes, 'sexe', 'F')</code> → <code>2400.0</code>

        Les guillemets transforment la variable en chaîne. Python itère sur les lettres, pas sur les employés.
        Résultat : None au lieu du résultat attendu → TypeError lors de la soustraction.
      </div>
      <div class="piege-card">
        <strong>Piège 2 — Oublier la liste vide</strong><br>
        Diviser par zéro si aucun employé ne correspond au filtre. Toujours tester
        <code>if len(liste) == 0: return None</code> avant de calculer la moyenne.
      </div>
      <div class="piege-card">
        <strong>Piège 3 — Différence vs pourcentage</strong><br>
        <code>moy_h - moy_f</code> = 283 € (euros). <code>(moy_h - moy_f) / moy_h * 100</code> = 10,6 % (pourcentage).
        L'énoncé demande toujours le pourcentage.
      </div>
      <div class="piege-card">
        <strong>Piège 4 — Biais k-NN</strong><br>
        Inclure une caractéristique sensible dans la distance = regrouper par cette caractéristique
        = reproduire les inégalités des données d'entraînement.
      </div>
      <div class="piege-card">
        <strong>Piège 5 — <code>is None</code> vs <code>== None</code></strong><br>
        Bonne pratique Python : toujours <code>if x is None</code>, jamais <code>if x == None</code>.
        Les deux fonctionnent pour None, mais <code>is</code> est plus idiomatique.
      </div>
    `
  },

  // ── RÉCAP ────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────
// MOTEUR
// ─────────────────────────────────────────────
let current = 0;
let timerOn = false;
let timerSec = 0;
let timerInterval = null;

const slidesEl  = document.getElementById('slides');
const stripEl   = document.getElementById('strip');
const tbBar     = document.getElementById('tbBar');
const tbCounter = document.getElementById('tbCounter');
const tbTimer   = document.getElementById('tbTimer');
const navTitle  = document.getElementById('navTitle');
const navSub    = document.getElementById('navSub');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');

// Build DOM
SLIDES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.id = 'slide-' + i;
  div.innerHTML = `
    <div class="slide-type" style="color:var(--gris)">
      <span>${s.type.toUpperCase()}</span>
      <span class="seg-badge ${s.badge}">${s.segment}</span>
    </div>
    <div class="slide-title">${s.title}</div>
    <div class="speech">${s.speech}</div>
  `;
  slidesEl.appendChild(div);

  const seg = document.createElement('div');
  seg.className = 'seg-item';
  seg.id = 'seg-' + i;
  seg.innerHTML = `<span class="si-num">${String(i+1).padStart(2,'0')}</span>${s.segment}`;
  seg.onclick = () => goTo(i);
  stripEl.appendChild(seg);
});

function goTo(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  document.getElementById('slide-' + current)?.classList.remove('active');
  document.getElementById('seg-'   + current)?.classList.remove('active');
  current = idx;
  const sl = document.getElementById('slide-' + current);
  const sg = document.getElementById('seg-'   + current);
  sl?.classList.add('active');
  if (sg) { sg.classList.add('active'); sg.scrollIntoView({ block:'nearest', behavior:'smooth' }); }

  const pct = Math.round((current + 1) / SLIDES.length * 100);
  tbBar.style.width   = pct + '%';
  tbCounter.textContent = (current + 1) + ' / ' + SLIDES.length;
  navTitle.textContent  = SLIDES[current].title;
  navSub.textContent    = SLIDES[current].segment;
  btnPrev.disabled = (current === 0);
  btnNext.disabled = (current === SLIDES.length - 1);
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timerSec++;
    const m = Math.floor(timerSec / 60);
    const s = timerSec % 60;
    tbTimer.textContent = m + ':' + String(s).padStart(2,'0');
  }, 1000);
  timerOn = true;
}
function stopTimer()  { clearInterval(timerInterval); timerInterval = null; timerOn = false; }
function resetTimer() { stopTimer(); timerSec = 0; tbTimer.textContent = '0:00'; }

btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  const ov = document.getElementById('scOverlay');
  if (ov.classList.contains('visible')) {
    if (e.key === '?' || e.key === 'Escape') ov.classList.remove('visible');
    return;
  }
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(current - 1); }
  if (e.key === 'Home')       { e.preventDefault(); goTo(0); }
  if (e.key === 'End')        { e.preventDefault(); goTo(SLIDES.length - 1); }
  if (e.key === 't' || e.key === 'T') {
    timerOn ? stopTimer() : startTimer();
    tbTimer.style.color = timerOn ? 'var(--or2)' : 'var(--vert)';
  }
  if (e.key === 'r' || e.key === 'R') { resetTimer(); tbTimer.style.color = 'var(--gris)'; }
  if (e.key === '?') ov.classList.add('visible');
});

goTo(0);
</script>
